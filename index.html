<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LTFinance</title>

    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon.png">

    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/components.css">
</head>

<body>
    <!-- App Container -->
    <div id="app" class="app-container">
        <!-- Views will be injected here -->
    </div>

    <!-- Bottom Navigation Bar (Hidden on Login) -->
    <nav id="bottom-nav" class="bottom-nav hidden">
        <a href="#/" class="nav-item active" data-route="/">
            <i class="ph ph-house"></i>
            <span>Início</span>
        </a>
        <a href="#/historico" class="nav-item" data-route="/historico">
            <i class="ph ph-list-dashes"></i>
            <span>Histórico</span>
        </a>
        <a href="#/perfil" class="nav-item" data-route="/perfil">
            <i class="ph ph-user"></i>
            <span>Perfil</span>
        </a>
    </nav>

    <!-- Global FAB (Floating Action Button) -->
    <button id="fab-add" class="fab hidden" aria-label="Adicionar Transação">
        <i class="ph ph-plus"></i>
    </button>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Scripts -->
    <script type="module" src="/js/app.js"></script>
</body>

</html>
